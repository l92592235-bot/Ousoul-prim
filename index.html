<script>
    // Auto-inject footer on every page render
    window.addEventListener('DOMContentLoaded', function() {
      setInterval(function() {
        var app = document.getElementById('app');
        if (app && !app.querySelector('.lg-footer') && typeof getFooterHTML === 'function') {
          var footer = document.createElement('div');
          footer.innerHTML = getFooterHTML();
          app.appendChild(footer.firstElementChild);
        }
      }, 500);

      // Show terms on first visit
      setTimeout(function() {
        if (!localStorage.getItem('lg_terms_accepted') && typeof showTerms === 'function') {
          showTerms();
          var checkTerms = setInterval(function() {
            if (!document.querySelector('.terms-overlay')) {
              localStorage.setItem('lg_terms_accepted', 'true');
              clearInterval(checkTerms);
            }
          }, 500);
        }
      }, 1500);
    });

// ========== DATABASE LAYER (localStorage) ==========
const DB = {
  _get(key) { try { return JSON.parse(localStorage.getItem('ep_' + key) || '[]'); } catch(e) { return []; } },
  _set(key, val) { localStorage.setItem('ep_' + key, JSON.stringify(val)); },
  _getObj(key) { try { return JSON.parse(localStorage.getItem('ep_' + key) || '{}'); } catch(e) { return {}; } },
  _setObj(key, val) { localStorage.setItem('ep_' + key, JSON.stringify(val)); },
  
  // Settings
  getSettings() { 
    return this._getObj('settings') || { 
      company_name_ar: '', company_name_en: '', logo_url: '', 
      about_ar: '', about_en: '', thank_you_ar: 'شكراً لثقتكم بنا', 
      thank_you_en: 'Thank you for trusting us', admin_password: 'admin123',
      license_key: 'LG-2025-PRO1-ABCD'
    }; 
  },
  saveSettings(s) { this._setObj('settings', s); },
  
  // Clients
  getClients() { return this._get('clients'); },
  saveClient(c) { 
    let clients = this._get('clients');
    let idx = clients.findIndex(x => x.id === c.id);
    if (idx >= 0) clients[idx] = c; else clients.push(c);
    this._set('clients', clients);
  },
  deleteClient(id) {
    this._set('clients', this._get('clients').filter(x => x.id !== id));
    // Also delete related data
    this._set('stages_' + id, []);
    this._set('payments_' + id, []);
    this._set('updates_' + id, []);
    this._set('requests_' + id, []);
    this._set('materials_' + id, []);
    this._set('notifications_' + id, []);
  },
  
  // Stages
  getStages(clientId) { return this._get('stages_' + clientId); },
  saveStage(clientId, s) {
    let stages = this._get('stages_' + clientId);
    let idx = stages.findIndex(x => x.id === s.id);
    if (idx >= 0) stages[idx] = s; else stages.push(s);
    this._set('stages_' + clientId, stages);
  },
  deleteStage(clientId, id) {
    this._set('stages_' + clientId, this._get('stages_' + clientId).filter(x => x.id !== id));
  },
  
  // Payments
  getPayments(clientId) { return this._get('payments_' + clientId); },
  savePayment(clientId, p) {
    let payments = this._get('payments_' + clientId);
    let idx = payments.findIndex(x => x.id === p.id);
    if (idx >= 0) payments[idx] = p; else payments.push(p);
    this._set('payments_' + clientId, payments);
  },
  deletePayment(clientId, id) {
    this._set('payments_' + clientId, this._get('payments_' + clientId).filter(x => x.id !== id));
  },
  
  // Updates
  getUpdates(clientId) { return this._get('updates_' + clientId); },
  saveUpdate(clientId, u) {
    let updates = this._get('updates_' + clientId);
    let idx = updates.findIndex(x => x.id === u.id);
    if (idx >= 0) updates[idx] = u; else updates.push(u);
    this._set('updates_' + clientId, updates);
  },
  deleteUpdate(clientId, id) {
    this._set('updates_' + clientId, this._get('updates_' + clientId).filter(x => x.id !== id));
  },
  
  // Document Requests
  getRequests(clientId) { return this._get('requests_' + clientId); },
  saveRequest(clientId, r) {
    let requests = this._get('requests_' + clientId);
    let idx = requests.findIndex(x => x.id === r.id);
    if (idx >= 0) requests[idx] = r; else requests.push(r);
    this._set('requests_' + clientId, requests);
  },
  deleteRequest(clientId, id) {
    this._set('requests_' + clientId, this._get('requests_' + clientId).filter(x => x.id !== id));
  },
  
  // Materials
  getMaterials(clientId) { return this._get('materials_' + clientId); },
  saveMaterial(clientId, m) {
    let materials = this._get('materials_' + clientId);
    let idx = materials.findIndex(x => x.id === m.id);
    if (idx >= 0) materials[idx] = m; else materials.push(m);
    this._set('materials_' + clientId, materials);
  },
  deleteMaterial(clientId, id) {
    this._set('materials_' + clientId, this._get('materials_' + clientId).filter(x => x.id !== id));
  },
  
  // Notifications
  getNotifications(clientId) { return this._get('notifications_' + clientId); },
  addNotification(clientId, n) {
    let notifs = this._get('notifications_' + clientId);
    notifs.unshift(n);
    this._set('notifications_' + clientId, notifs);
  },
  markNotificationsRead(clientId) {
    let notifs = this._get('notifications_' + clientId);
    notifs.forEach(n => n.read = true);
    this._set('notifications_' + clientId, notifs);
  }
};

function render() {
  const app = document.getElementById('app');
  if (!state.licenseVerified) { app.innerHTML = renderLicenseScreen(); return; }
  switch(state.screen) {
    case 'login': app.innerHTML = renderLoginScreen(); break;
    case 'admin': app.innerHTML = renderAdminScreen(); break;
    case 'client': app.innerHTML = renderClientPortal(); break;
    case 'clientDetail': app.innerHTML = renderClientDetail(); break;
  }
}

function saveClient() {
  const name = document.getElementById('cName').value.trim();
  const project = document.getElementById('cProject').value.trim();
  if (!name || !project) { alert(currentLang==='ar'?'الاسم والمشروع مطلوبان':'Name and project are required'); return; }
  
  const client = state.editItem || { id: uid(), access_code: generateAccessCode(), created_at: new Date().toISOString() };
  client.name = name;
  client.project_name = project;
  client.phone = document.getElementById('cPhone').value.trim();
  client.email = document.getElementById('cEmail').value.trim();
  client.engineer_name = document.getElementById('cEngineer').value.trim();
  client.engineer_phone = document.getElementById('cEngineerPhone').value.trim();
  client.total_amount = document.getElementById('cTotal').value.trim();
  
  DB.saveClient(client);
  state.showModal = null;
  render();
}

function generateAccessCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function confirmDeleteClient(id) {
  state.showModal = 'confirmDelete';
  state._deleteTarget = { type: 'client', id };
  render();
}

function renderConfirmDeleteModal() {
  return `
    <div class="modal-overlay" onclick="if(event.target===this){state.showModal=null;render()}">
      <div class="modal-content fade-in text-center">
        <div class="text-5xl mb-4">⚠️</div>
        <h3 class="text-xl font-bold mb-2">${t('confirmDelete')}</h3>
        <div class="flex gap-3 justify-center mt-6">
          <button onclick="executeDelete()" class="btn-danger text-white px-8 py-2 rounded-xl font-bold">${t('yes')}</button>
          <button onclick="state.showModal=null;render()" class="bg-gray-200 text-gray-700 px-8 py-2 rounded-xl font-bold">${t('no')}</button>
        </div>
      </div>
    </div>`;
}

function executeDelete() {
  const target = state._deleteTarget;
  if (!target) return;
  const clientId = state.selectedClient?.id;
  
  switch(target.type) {
    case 'client': DB.deleteClient(target.id); break;
    case 'stage': DB.deleteStage(clientId, target.id); break;
    case 'payment': DB.deletePayment(clientId, target.id); break;
    case 'update': DB.deleteUpdate(clientId, target.id); break;
    case 'request': DB.deleteRequest(clientId, target.id); break;
    case 'material': DB.deleteMaterial(clientId, target.id); break;
  }
  state.showModal = null;
  render();
}

function confirmDeleteItem(type, id) {
  state.showModal = 'confirmDelete';
  state._deleteTarget = { type, id };
  render();
}

        ${requests.map(r => `
          <div class="glass rounded-xl p-4">

            <!-- Client can respond -->
            <div class="mt-3 flex gap-2">
              <input id="resp_${r.id}" class="input-styled flex-1" placeholder="${t('clientResponse')}..." value="" />
              <button onclick="submitClientResponse('${r.id}')" class="btn-primary text-white px-4 py-2 rounded-xl text-sm font-bold">${t('save')}</button>
            </div>
            
            <!-- File upload for client -->
            <div class="mt-2">
              <label class="glass text-white px-3 py-2 rounded-lg text-sm cursor-pointer inline-block">
                📎 ${t('uploadFile')}
                <input type="file" class="hidden" onchange="handleClientFileUpload('${r.id}', this)" />

              ${r.file_url ? `<a href="${r.file_url}" target="_blank" class="text-blue-400 text-sm mr-2">📎 ${currentLang==='ar'?'ملف مرفق':'Attached'}</a>` : ''}

          </div>
        `).join('')}
      </div>

function submitClientResponse(requestId) {
  const input = document.getElementById('resp_' + requestId);
  if (!input || !input.value.trim()) return;
  const c = state.selectedClient;
  const requests = DB.getRequests(c.id);
  const req = requests.find(r => r.id === requestId);
  if (req) {
    req.client_response = input.value.trim();
    DB.saveRequest(c.id, req);
    DB.addNotification(c.id, { id: uid(), message: currentLang==='ar' ? 'تم إرسال ردك بنجاح' : 'Your response was sent', read: false, date: new Date().toISOString() });
    render();
  }
}

function handleClientFileUpload(requestId, input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    const c = state.selectedClient;
    const req = DB.getRequests(c.id).find(r => r.id === requestId);
    if (req) {
      req.file_url = e.target.result;
      req.file_name = file.name;
      DB.saveRequest(c.id, req);
      render();
    }
  };
  reader.readAsDataURL(file);
}

function renderClientMaterials(c) {
  const materials = DB.getMaterials(c.id);
  return materials.length === 0 ? `<div class="glass rounded-xl p-8 text-center text-gray-400">${t('noData')}</div>` : `
    <div class="grid gap-4 md:grid-cols-2">
      ${materials.map(m => `
        <div class="glass rounded-xl overflow-hidden">
          ${m.image_url ? `<img src="${m.image_url}" class="w-full h-48 object-cover" onerror="this.style.display='none'" />` : ''}
          <div class="p-4">
            <h4 class="text-white font-bold">${m.name}</h4>
            <p class="text-gray-300 text-sm mt-1">${m.description || ''}</p>
            <div class="mt-3 flex gap-2">
              ${m.status === 'pending' ? `
                <button onclick="clientMaterialAction('${m.id}','approved')" class="btn-success text-white px-4 py-2 rounded-xl text-sm font-bold flex-1">✅ ${t('approve')}</button>
                <button onclick="clientMaterialAction('${m.id}','rejected')" class="btn-danger text-white px-4 py-2 rounded-xl text-sm font-bold flex-1">❌ ${t('reject')}</button>
              ` : `
                <span class="stage-badge ${m.status === 'approved' ? 'stage-completed' : 'bg-red-500/20 text-red-400'} w-full text-center py-2">
                  ${m.status === 'approved' ? '✅ ' + t('approved') : '❌ ' + t('rejected')}
                </span>
              `}
            </div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

function clientMaterialAction(materialId, status) {
  const c = state.selectedClient;
  const mat = DB.getMaterials(c.id).find(m => m.id === materialId);
  if (mat) {
    mat.status = status;
    DB.saveMaterial(c.id, mat);
    DB.addNotification(c.id, { id: uid(), message: currentLang==='ar' ? (status==='approved'?'تمت الموافقة على المادة':'تم رفض المادة') : (status==='approved'?'Material approved':'Material rejected'), read: false, date: new Date().toISOString() });
    render();
  }
}

function renderClientNotifications(c) {
  const notifications = DB.getNotifications(c.id);
  if (notifications.length > 0) { DB.markNotificationsRead(c.id); }
  return notifications.length === 0 ? `<div class="glass rounded-xl p-8 text-center text-gray-400">${t('noData')}</div>` : `
    <div class="space-y-2">
      ${notifications.map(n => `
        <div class="glass rounded-xl p-3 ${n.read ? '' : 'border-l-4 border-blue-500'}">
          <p class="text-white text-sm">${n.message}</p>
          <span class="text-gray-500 text-xs">${new Date(n.date).toLocaleDateString(currentLang==='ar'?'ar-QA':'en-US')}</span>
        </div>
      `).join('')}
    </div>`;
}

  DB.saveStage(state.selectedClient.id, stage);
  DB.addNotification(state.selectedClient.id, { id: uid(), message: currentLang==='ar'?'تم تحديث المراحل':'Stages updated', read:false, date: new Date().toISOString() });

function renderMaterialModal() {
  const m = state.editItem || {};
  return `
    <div class="modal-overlay" onclick="if(event.target===this){state.showModal=null;render()}">
      <div class="modal-content fade-in">
        <h3 class="text-xl font-bold mb-4">${state.editItem ? t('edit') : t('add')} ${t('materials')}</h3>
        <div class="space-y-3">
          <input id="matName" class="input-styled" placeholder="${t('materialName')} *" value="${m.name||''}" />
          <textarea id="matDesc" class="input-styled" placeholder="${t('materialDesc')}">${m.description||''}</textarea>
          <input id="matImage" class="input-styled" placeholder="${t('imageUrl')}" value="${m.image_url||''}" />
          <div>
            <label class="text-gray-600 text-sm block mb-1">${currentLang==='ar'?'أو ارفع صورة':'Or upload image'}</label>
            <input type="file" accept="image/*" class="input-styled" onchange="handleMaterialImageUpload(this)" />
          </div>
        </div>
        <div class="flex gap-2 mt-4">
          <button onclick="saveMaterialItem()" class="btn-primary text-white px-6 py-2 rounded-xl font-bold flex-1">${t('save')}</button>
          <button onclick="state.showModal=null;render()" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-xl font-bold">${t('cancel')}</button>
        </div>
      </div>
    </div>`;
}

let _tempMaterialImage = null;
function handleMaterialImageUpload(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    _tempMaterialImage = e.target.result;
    document.getElementById('matImage').value = '(uploaded)';
  };
  reader.readAsDataURL(input.files[0]);
}

function saveMaterialItem() {
  const name = document.getElementById('matName').value.trim();
  if (!name) return;
  const mat = state.editItem || { id: uid(), status: 'pending' };
  mat.name = name;
  mat.description = document.getElementById('matDesc').value;
  const imageInput = document.getElementById('matImage').value;
  if (_tempMaterialImage) {
    mat.image_url = _tempMaterialImage;
    _tempMaterialImage = null;
  } else if (imageInput && imageInput !== '(uploaded)') {
    mat.image_url = imageInput;
  }
  DB.saveMaterial(state.selectedClient.id, mat);
  DB.addNotification(state.selectedClient.id, { id: uid(), message: currentLang==='ar'?'مادة جديدة مقترحة':'New material suggestion', read:false, date: new Date().toISOString() });
  state.showModal = null;
  render();
}

render();
